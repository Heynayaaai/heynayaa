<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeyNayaa Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050510;
      color: white;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 280px;
      background: #0d0d18;
      border-right: 1px solid #222;
      padding: 24px;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .character {
      padding: 16px;
      border-radius: 16px;
      background: #151522;
      border: 1px solid #a855f7;
    }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 22px 30px;
      border-bottom: 1px solid #222;
      background: #080812;
    }

    .messages {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .message {
      max-width: 650px;
      padding: 16px 20px;
      border-radius: 18px;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .ai {
      background: #151522;
      color: #eee;
    }

    .user {
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      margin-left: auto;
    }

    .input-area {
      display: flex;
      gap: 12px;
      padding: 20px;
      border-top: 1px solid #222;
      background: #080812;
    }

    input {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #333;
      background: #111827;
      color: white;
      font-size: 16px;
    }

    button {
      padding: 16px 28px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    @media (max-width: 800px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="logo">HeyNayaa</div>

    <div class="character">
      <strong>Nayaa</strong><br />
      Deine KI-Begleiterin
    </div>
  </aside>

  <main class="chat">
    <div class="chat-header">
      <strong>Nayaa</strong> · KI-Begleiterin
    </div>

    <div class="messages" id="Nachrichten">
      <div class="message ai">
        Hey, ich bin Nayaa. Ich bin deine KI-Begleiterin. Schön, dass du da bist. Wie war dein Tag?
      </div>
    </div>

    <div class="input-area">
      <input
        id="Benutzereingabe"
        placeholder="Schreibe eine Nachricht..."
      />

      <button onclick="NachrichtSenden()">
        Senden
      </button>
    </div>
  </main>

  <script>
    async function NachrichtSenden() {
      const eingang = document.getElementById("Benutzereingabe");
      const nachrichten = document.getElementById("Nachrichten");
      const message = eingang.value.trim();

      if (!message) return;

      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.textContent = message;
      nachrichten.appendChild(userMsg);

      eingang.value = "";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        const aiMsg = document.createElement("div");
        aiMsg.className = "message ai";
        aiMsg.textContent = data.reply || "Nayaa konnte gerade nicht antworten.";
        nachrichten.appendChild(aiMsg);

        nachrichten.scrollTop = nachrichten.scrollHeight;
      } catch (error) {
        const errorMsg = document.createElement("div");
        errorMsg.className = "message ai";
        errorMsg.textContent = "Nayaa ist gerade nicht erreichbar.";
        nachrichten.appendChild(errorMsg);
      }
    }
  </script>

</body>
</html>
