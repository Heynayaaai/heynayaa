<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeyNayaa</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#050510;
      color:white;
      overflow-x:hidden;
    }

    .bg-glow{
      position:fixed;
      width:700px;
      height:700px;
      background:#7c3aed;
      filter:blur(180px);
      opacity:.3;
      top:-200px;
      right:-200px;
      z-index:-1;
    }

    nav{
      padding:30px 8%;
      font-size:30px;
      font-weight:bold;
    }

    .gradient{
      background:linear-gradient(90deg,#a855f7,#ec4899);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero{
      min-height:90vh;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:80px;
      padding:40px 8%;
    }

    .hero-left{
      flex:1;
      max-width:700px;
    }

    .hero-right{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .girl{
      width:100%;
      max-width:500px;
      border-radius:32px;
      object-fit:cover;

      box-shadow:
        0 0 90px rgba(168,85,247,.25);

      border:1px solid rgba(255,255,255,.08);
    }

    .kiss{
      font-size:64px;
      margin-bottom:20px;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1)}
      50%{transform:scale(1.08)}
      100%{transform:scale(1)}
    }

    h1{
      font-size:82px;
      line-height:1.05;
      margin-bottom:30px;
      font-weight:800;
    }

    .subtitle{
      font-size:24px;
      color:#b3b3b3;
      line-height:1.7;
      margin-bottom:45px;
    }

    .chatbar{
      display:flex;
      align-items:center;
      gap:14px;
      max-width:850px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border-radius:999px;
      padding:14px 18px;

      box-shadow:
        0 0 40px rgba(168,85,247,.18),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .avatar{
      width:58px;
      height:58px;
      border-radius:50%;
      background:linear-gradient(135deg,#a855f7,#ec4899);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      flex-shrink:0;
    }

    .chatbar input{
      flex:1;
      background:transparent;
      border:none;
      color:white;
      font-size:19px;
      outline:none;
      padding:10px;
    }

    .chatbar input::placeholder{
      color:#888;
    }

    .chatbar button{
      border:none;
      border-radius:999px;
      padding:18px 34px;
      background:linear-gradient(90deg,#7c3aed,#ec4899);
      color:white;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
      transition:.25s;
    }

    .chatbar button:hover{
      transform:scale(1.04);
    }

    .hint{
      margin-top:22px;
      color:#666;
      font-size:14px;
    }

    footer{
      padding:40px;
      text-align:center;
      color:#555;
    }

    @media(max-width:900px){

      .hero{
        flex-direction:column;
        text-align:center;
      }

      nav{
        font-size:24px;
      }

      h1{
        font-size:52px;
      }

      .subtitle{
        font-size:18px;
      }

      .girl{
        max-width:340px;
      }

      .chatbar{
        flex-direction:column;
        border-radius:30px;
      }

      .chatbar button{
        width:100%;
      }
    }

  </style>
</head>

<body>

<div class="bg-glow"></div>

<nav>
  <span class="gradient">Hey</span>Nayaa
</nav>

<section class="hero">

  <div class="hero-left">

    <div class="kiss">💋</div>

    <h1>
      Schreib deiner
      <span class="gradient">KI-Begleiterin</span>
    </h1>

    <p class="subtitle">
      Nayaa ist warmherzig, aufmerksam und immer bereit für ein persönliches Gespräch.
    </p>

    <div class="chatbar">

      <div class="avatar">
        💋
      </div>

      <input
        id="startMessage"
        placeholder="Schreib Nayaa eine Nachricht..."
        onkeydown="if(event.key === 'Enter') startChat()"
      />

      <button onclick="startChat()">
        Senden
      </button>

    </div>

    <div class="hint">
      Nayaa ist eine KI-Begleiterin.
    </div>

  </div>

  <div class="hero-right">

    <img
      src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
      class="girl"
    />

  </div>

</section>

<footer>
  © 2026 HeyNayaa AI
</footer>

<script>

  function startChat(){

    const input =
      document.getElementById("startMessage");

    const message =
      input.value.trim();

    if(message){

      localStorage.setItem(
        "nayaa_start_message",
        message
      );

    }

    window.location.href =
      "chat.html";
  }

</script>

</body>
</html>
