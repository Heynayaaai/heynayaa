<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeyNayaa</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:Arial,sans-serif;
      background:#050510;
      color:white;
      overflow-x:hidden;
    }

    .bg-glow{
      position:fixed;
      width:700px;
      height:700px;
      background:#7c3aed;
      filter:blur(180px);
      opacity:.3;
      top:-200px;
      right:-200px;
      z-index:-1;
    }

    nav{
      padding:30px 8%;
      font-size:28px;
      font-weight:bold;
    }

    .hero{
      min-height:90vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px;
    }

    .hero-content{
      max-width:900px;
    }

    .nayaa{
      font-size:70px;
      margin-bottom:15px;
    }

    .kiss{
      font-size:54px;
      margin-bottom:20px;
      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1)}
      50%{transform:scale(1.08)}
      100%{transform:scale(1)}
    }

    h1{
      font-size:76px;
      line-height:1.05;
      margin-bottom:25px;
    }

    .gradient{
      background:linear-gradient(90deg,#a855f7,#ec4899);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      font-size:22px;
      color:#b3b3b3;
      line-height:1.6;
      margin-bottom:38px;
    }

    .chatbar{
      display:flex;
      gap:12px;
      max-width:720px;
      margin:0 auto;
      background:#0d0d18;
      border:1px solid #2b2b2b;
      border-radius:22px;
      padding:12px;
      box-shadow:0 0 40px rgba(168,85,247,.25);
    }

    .chatbar input{
      flex:1;
      background:#111827;
      border:1px solid #333;
      color:white;
      padding:18px 20px;
      border-radius:16px;
      font-size:17px;
      outline:none;
    }

    .chatbar button{
      border:none;
      border-radius:16px;
      padding:18px 28px;
      background:linear-gradient(90deg,#7c3aed,#ec4899);
      color:white;
      font-weight:bold;
      font-size:17px;
      cursor:pointer;
    }

    .hint{
      margin-top:18px;
      color:#777;
      font-size:14px;
    }

    footer{
      padding:40px;
      text-align:center;
      color:#666;
    }

    @media(max-width:768px){
      h1{font-size:46px}
      .nayaa{font-size:50px}
      .chatbar{flex-direction:column}
      .chatbar button{width:100%}
    }
  </style>
</head>

<body>

<div class="bg-glow"></div>

<nav>HeyNayaa</nav>

<section class="hero">
  <div class="hero-content">

    <div class="nayaa">Nayaa</div>
    <div class="kiss">💋</div>

    <h1>
      Schreib deiner
      <span class="gradient">KI-Begleiterin</span>
    </h1>

    <p class="subtitle">
      Nayaa ist warmherzig, aufmerksam und immer bereit für ein persönliches Gespräch.
    </p>

    <div class="chatbar">
      <input
        id="startMessage"
        placeholder="Schreib Nayaa etwas..."
        onkeydown="if(event.key === 'Enter') startChat()"
      />

      <button onclick="startChat()">
        Senden
      </button>
    </div>

    <div class="hint">
      Nayaa ist eine KI-Begleiterin.
    </div>

  </div>
</section>

<footer>
  © 2026 HeyNayaa AI
</footer>

<script>
  function startChat(){
    const input = document.getElementById("startMessage");
    const message = input.value.trim();

    if(message){
      localStorage.setItem("nayaa_start_message", message);
    }

    window.location.href = "chat.html";
  }
</script>

</body>
</html>
