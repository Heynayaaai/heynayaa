<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NayaAI</title>

  <style>
    body{
      margin:0;
      background:#0b0b0f;
      color:white;
      font-family:Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }

    .box{
      max-width:700px;
    }

    h1{
      font-size:70px;
      margin-bottom:10px;
    }

    p{
      color:#aaa;
      font-size:20px;
    }

    button{
      margin-top:30px;
      padding:15px 35px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>NayaAI</h1>

  <p>
    Your emotionally intelligent AI companion.
  </p>

  <button>
    Start Chatting
  </button>
</div>

</body>
</html>
